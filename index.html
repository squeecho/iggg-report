<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이견공간 공사보고 자동화</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f9fafb;
  color: #111827;
  font-size: 14px;
  padding-bottom: 60px;
}

.wrap {
  max-width: 576px;
  margin: 0 auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Card */
.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 16px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}
.card-content { display: flex; flex-direction: column; gap: 16px; }

/* Label */
.label {
  display: block;
  font-weight: 500;
  font-size: 14px;
  margin-bottom: 4px;
}

/* Input */
.input {
  border: 1px solid #d1d5db;
  border-radius: 4px;
  padding: 8px 12px;
  font-size: 14px;
  font-family: inherit;
  width: 100%;
  outline: none;
}
.input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }
.input:disabled { background: #f3f4f6; color: #6b7280; }

/* Textarea */
textarea.input { resize: none; min-height: 60px; }

/* Flex row */
.flex { display: flex; }
.flex-gap2 { display: flex; gap: 8px; }
.flex-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.flex-1 { flex: 1; }
.items-center { align-items: center; }
.mt2 { margin-top: 8px; }

/* Buttons */
.btn {
  border-radius: 4px;
  padding: 8px 16px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  font-weight: 400;
  transition: opacity .15s, background .15s, color .15s;
  border: 1px solid transparent;
  white-space: nowrap;
}
.btn:active { transform: scale(0.98); }
.btn-default { background: #2563eb; color: #fff; border-color: #2563eb; }
.btn-default:hover { opacity: .9; }
.btn-outline { background: #fff; color: #374151; border-color: #9ca3af; }
.btn-outline:hover { background: #f9fafb; }
.btn-sm { padding: 6px 12px; font-size: 14px; }
.btn-full { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* 섹션 헤더 - 노란색 */
.section-header {
  background: #FFF9E6;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  text-align: center;
}
.section-header h3 {
  font-size: 18px;
  font-weight: 700;
  color: #222933;
}

/* 섹션 헤더 - 파란색 (남은일정) */
.section-header-blue {
  background: #E6F9FF;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  text-align: center;
}
.section-header-blue h3 { font-size: 18px; font-weight: 700; color: #222933; }
.section-header-blue p { font-size: 14px; color: #6b7280; margin-top: 4px; }

/* 카테고리 박스 */
.cat-box {
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  padding: 8px;
  background: #f9fafb;
  margin-bottom: 16px;
}
.cat-title {
  font-weight: 700;
  font-size: 15px;
  padding-bottom: 8px;
  margin-bottom: 8px;
  border-bottom: 1px solid #e5e7eb;
}

/* 현장 태그 */
.site-tag {
  display: flex;
  align-items: center;
  gap: 4px;
  border: 1px solid #e5e7eb;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 14px;
}
.site-tag-name { cursor: pointer; }
.site-del-btn {
  background: none;
  border: none;
  color: #ef4444;
  cursor: pointer;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 4px;
  transition: background .15s, color .15s;
}
.site-del-btn:hover { background: #ef4444; color: #fff; }

/* 체크박스 */
.checkbox-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.checkbox-wrap input[type=checkbox] {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: #2563eb;
}
.checkbox-wrap label { font-weight: 500; cursor: pointer; }

/* 남은일정 아이템 */
.schedule-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  background: #f9fafb;
  border-radius: 6px;
  gap: 6px;
}
.schedule-item .input { font-size: 13px; padding: 4px 8px; }
.schedule-item-date { width: 72px; text-align: center; font-weight: 500; color: #2563eb; }
.schedule-item-day { color: #9ca3af; font-size: 13px; white-space: nowrap; }
.schedule-item-work { flex: 1; }

.del-btn {
  background: #ef4444;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  padding: 4px 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
}
.del-btn:hover { background: #dc2626; }

/* 빈 안내 */
.empty-msg { font-size: 14px; color: #6b7280; text-align: center; }

/* 현장별 관리 */
.template-box {
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  padding: 12px;
  background: #f9fafb;
  margin-bottom: 12px;
}
.template-box h4 { font-weight: 500; margin-bottom: 8px; }
.template-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  background: #fff;
  border-radius: 6px;
  border: 1px solid #e5e7eb;
  margin-bottom: 6px;
}
.template-load-btn {
  background: none;
  border: 1px solid #e5e7eb;
  border-radius: 4px;
  color: #2563eb;
  font-size: 14px;
  padding: 4px 8px;
  cursor: pointer;
}
.template-load-btn:hover { color: #1d4ed8; }

/* 결과 */
.result-box {
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 8px;
}

/* 자동날짜 표시 */
.auto-date {
  color: #2563eb;
  font-weight: 500;
  min-width: 90px;
  text-align: center;
  font-size: 14px;
}

/* 날짜 건너뛰기 힌트 */
.hint { font-size: 12px; color: #9ca3af; margin-bottom: 8px; }

/* Toast */
#toast {
  display: none;
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #000;
  color: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  z-index: 1000;
}

/* 스크롤 영역 */
.scroll-40 { max-height: 160px; overflow-y: auto; }
.scroll-60 { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.space-y2 { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <div class="card-content">

      <!-- 현장명 -->
      <div>
        <label class="label">현장명</label>
        <div class="flex-gap2">
          <input class="input flex-1" id="siteInput" placeholder="예: 이견공간 뉴욕점" onkeydown="if(event.key==='Enter')addSite()">
          <button class="btn btn-default" onclick="addSite()">추가</button>
        </div>
        <div class="flex-wrap mt2" id="siteList"></div>
      </div>

      <!-- 오늘 작업 공정 -->
      <div>
        <div class="section-header"><h3>오늘 작업 공정</h3></div>
        <!-- 오늘 / 오늘까지 -->
        <div class="flex-gap2" style="margin-bottom:12px">
          <button class="btn btn-default" id="tab-오늘" onclick="setTodayType('오늘')">오늘</button>
          <button class="btn btn-outline" id="tab-오늘까지" onclick="setTodayType('오늘까지')">오늘까지</button>
        </div>
        <div id="todayCats"></div>
      </div>

      <!-- 다음 작업 일정 -->
      <div>
        <label class="label">다음 작업 일정</label>
        <div class="flex-gap2">
          <button class="btn btn-default" id="tab-내일" onclick="setNextType('내일')">내일</button>
          <button class="btn btn-outline" id="tab-월요일" onclick="setNextType('월요일')">월요일</button>
        </div>
      </div>

      <!-- 내일 작업 공정 -->
      <div>
        <div class="section-header"><h3 id="nextHeader">내일 작업 공정</h3></div>
        <div id="nextCats"></div>
      </div>

      <!-- 특이사항 -->
      <div>
        <label class="label">특이사항</label>
        <textarea class="input" id="note" placeholder="없음 또는 특이사항 메모">금일 특이사항 없습니다.</textarea>
      </div>

      <!-- 공사마감 임박 -->
      <div class="checkbox-wrap">
        <input type="checkbox" id="deadlineCheck" onchange="toggleDeadline()">
        <label for="deadlineCheck">공사마감 1주일 전 (남은 일정 안내 표시)</label>
      </div>

      <!-- 남은 일정 -->
      <div id="scheduleSection" style="display:none">
        <div class="section-header-blue">
          <h3>남은 일정 안내</h3>
          <p id="scheduleSubtitle">오늘 기준으로 자동으로 날짜가 생성됩니다</p>
        </div>

        <!-- 현장별 관리 -->
        <div class="template-box">
          <h4>현장별 관리</h4>
          <div class="flex-gap2" style="margin-bottom:8px">
            <input class="input flex-1" id="templateSiteName" disabled>
            <button class="btn btn-outline" id="saveTemplateBtn" onclick="saveTemplate()">현재 일정 저장</button>
          </div>
          <div class="scroll-40 space-y2" id="templateList">
            <p class="empty-msg">저장된 템플릿이 없습니다</p>
          </div>
        </div>

        <!-- 일정 추가 -->
        <div class="flex-gap2 items-center" style="margin-bottom:4px">
          <div class="auto-date" id="autoDate"></div>
          <input class="input" id="customDate" placeholder="날짜 변경 (예: 3/22)" style="width:110px">
          <input class="input flex-1" id="scheduleWork" placeholder="작업 (예: 타일)" onkeydown="if(event.key==='Enter')addSchedule()">
          <button class="btn btn-default" onclick="addSchedule()">추가</button>
        </div>
        <p class="hint">날짜 변경란 비우면 자동 날짜로 추가됩니다</p>

        <!-- 일정 목록 -->
        <div class="scroll-60" id="scheduleList">
          <p class="empty-msg">남은 일정이 없습니다</p>
        </div>
      </div>

      <!-- 보고서 생성 -->
      <button class="btn btn-default btn-full" style="padding:10px" onclick="generate()">보고서 생성</button>

    </div>
  </div>

  <!-- 결과 -->
  <div class="card" id="resultCard" style="display:none">
    <div class="card-content">
      <div class="result-box" id="resultBox"></div>
      <button class="btn btn-default btn-full" onclick="copyResult()">보고서 복사하기</button>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
// ── 데이터 ──
const CATS = {
  '기초': ['철거','자재 입고','가설','보양','폐기물처리','현장 정리'],
  '본공사': ['목공','전기','금속','설비','방통','양생','도장','필름','타일','덕트','경량','내외부마감','준공 청소','도배','데코타일','바닥마루','아트미장','바닥마감','화장실마감','도기설치','외부 데크'],
  '외주': ['에어컨','간판','주방 입고','가스','온수기 설치','의탁자 입고','CCTV','소방','인터넷','폴딩도어','덤웨이터','블라인드']
}
const 요일목록 = ['일','월','화','수','목','금','토']

// ── 상태 ──
let 현장명 = ''
let 현장목록 = []
let 오늘공정 = []
let 내일공정 = []
let todayType = '오늘'
let nextType = '내일'
let 마감임박 = false
let 남은일정 = []          // [{날짜, 작업}]
let 현장별일정 = {}
let 템플릿목록 = {}

// ── localStorage 로드 ──
function loadStorage() {
  try {
    현장명 = localStorage.getItem('현장명') || ''
    현장목록 = JSON.parse(localStorage.getItem('현장목록') || '[]')
    마감임박 = JSON.parse(localStorage.getItem('공사마감임박') || 'false')
    현장별일정 = JSON.parse(localStorage.getItem('현장별남은일정') || '{}')
    템플릿목록 = JSON.parse(localStorage.getItem('템플릿목록') || '{}')
    if (현장명 && 현장별일정[현장명]) 남은일정 = 현장별일정[현장명]
  } catch(e) {}
}

function saveStorage() {
  localStorage.setItem('현장명', 현장명)
  localStorage.setItem('현장목록', JSON.stringify(현장목록))
  localStorage.setItem('공사마감임박', JSON.stringify(마감임박))
  localStorage.setItem('현장별남은일정', JSON.stringify(현장별일정))
  localStorage.setItem('템플릿목록', JSON.stringify(템플릿목록))
}

// ── 토스트 ──
let toastTimer
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.style.display = 'block'
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => t.style.display = 'none', 2000)
}

// ── 현장명 ──
function addSite() {
  const val = document.getElementById('siteInput').value.trim()
  if (!val) return showToast('현장명을 입력해주세요.')
  if (현장목록.includes(val)) return showToast('이미 있는 현장입니다.')
  현장목록.unshift(val)
  현장명 = val
  document.getElementById('siteInput').value = ''
  saveStorage()
  renderSites()
  syncScheduleToSite()
  showToast('현장명이 추가되었습니다.')
}

function selectSite(name) {
  현장명 = name
  document.getElementById('siteInput').value = name
  남은일정 = 현장별일정[현장명] ? [...현장별일정[현장명]] : []
  saveStorage()
  renderSites()
  renderScheduleList()
  updateAutoDate()
  updateScheduleSubtitle()
  if (document.getElementById('templateSiteName'))
    document.getElementById('templateSiteName').value = 현장명
}

function deleteSite(name) {
  delete 현장별일정[name]
  현장목록 = 현장목록.filter(x => x !== name)
  if (현장명 === name) { 현장명 = ''; 남은일정 = [] }
  saveStorage()
  renderSites()
  renderScheduleList()
  showToast('현장명이 삭제되었습니다.')
}

function renderSites() {
  const el = document.getElementById('siteList')
  if (!현장목록.length) { el.innerHTML = ''; return }
  el.innerHTML = 현장목록.map(h => `
    <div class="site-tag">
      <span class="site-tag-name" onclick="selectSite('${h.replace(/'/g,"\\'")}')">
        ${h}
      </span>
      <button class="site-del-btn" onclick="deleteSite('${h.replace(/'/g,"\\'")}')">삭제</button>
    </div>
  `).join('')
}

// ── 카테고리 렌더 ──
function renderCats(containerId, checkedArr, toggleFn) {
  const el = document.getElementById(containerId)
  el.innerHTML = Object.entries(CATS).map(([cat, items]) => `
    <div class="cat-box">
      <p class="cat-title">${cat}</p>
      <div class="flex-wrap">
        ${items.map(item => `
          <button class="btn btn-sm ${checkedArr.includes(item) ? 'btn-default' : 'btn-outline'}"
            onclick="${toggleFn}('${item.replace(/'/g,"\\'")}')">
            ${item}
          </button>
        `).join('')}
      </div>
    </div>
  `).join('')
}

function toggleToday(item) {
  오늘공정 = 오늘공정.includes(item) ? 오늘공정.filter(x=>x!==item) : [...오늘공정, item]
  renderCats('todayCats', 오늘공정, 'toggleToday')
}
function toggleNext(item) {
  내일공정 = 내일공정.includes(item) ? 내일공정.filter(x=>x!==item) : [...내일공정, item]
  renderCats('nextCats', 내일공정, 'toggleNext')
}

// ── 오늘/오늘까지 ──
function setTodayType(type) {
  todayType = type
  document.getElementById('tab-오늘').className = 'btn ' + (type==='오늘' ? 'btn-default' : 'btn-outline')
  document.getElementById('tab-오늘까지').className = 'btn ' + (type==='오늘까지' ? 'btn-default' : 'btn-outline')
}

// ── 내일/월요일 ──
function setNextType(type) {
  nextType = type
  document.getElementById('tab-내일').className = 'btn ' + (type==='내일' ? 'btn-default' : 'btn-outline')
  document.getElementById('tab-월요일').className = 'btn ' + (type==='월요일' ? 'btn-default' : 'btn-outline')
  document.getElementById('nextHeader').textContent = type + ' 작업 공정'
}

// ── 마감임박 ──
function toggleDeadline() {
  마감임박 = document.getElementById('deadlineCheck').checked
  document.getElementById('scheduleSection').style.display = 마감임박 ? 'block' : 'none'
  saveStorage()
  if (마감임박) {
    document.getElementById('templateSiteName').value = 현장명
    updateAutoDate()
  }
}

// ── 날짜 유틸 ──
function get요일(dateStr) {
  const [m, d] = dateStr.split('/').map(Number)
  const dt = new Date()
  dt.setMonth(m - 1)
  dt.setDate(d)
  return 요일목록[dt.getDay()]
}

function getNextDate() {
  if (!남은일정.length) {
    const t = new Date(); t.setDate(t.getDate() + 1)
    return `${t.getMonth()+1}/${t.getDate()}`
  }
  const last = 남은일정[남은일정.length - 1].날짜
  const [m, d] = last.split('/').map(Number)
  const dt = new Date(); dt.setMonth(m-1); dt.setDate(d); dt.setDate(dt.getDate()+1)
  return `${dt.getMonth()+1}/${dt.getDate()}`
}

function updateAutoDate() {
  const el = document.getElementById('autoDate')
  if (!el) return
  const nd = getNextDate()
  el.textContent = `${nd}(${get요일(nd)})`
}

function updateScheduleSubtitle() {
  const el = document.getElementById('scheduleSubtitle')
  if (el) el.textContent = (남은일정.length === 0 ? '오늘' : '이전 일정') + ' 기준으로 자동으로 날짜가 생성됩니다'
}

function syncScheduleToSite() {
  if (현장명) 현장별일정[현장명] = 남은일정
  saveStorage()
}

// ── 남은일정 추가 ──
function addSchedule() {
  const work = document.getElementById('scheduleWork').value.trim()
  if (!work) return showToast('작업 내용을 입력해주세요.')
  if (!현장명) return showToast('현장을 먼저 선택해주세요.')
  const customDate = document.getElementById('customDate').value.trim()
  const 날짜 = customDate || getNextDate()
  남은일정.push({ 날짜, 작업: work })
  document.getElementById('scheduleWork').value = ''
  document.getElementById('customDate').value = ''
  syncScheduleToSite()
  renderScheduleList()
  updateAutoDate()
  updateScheduleSubtitle()
  showToast('남은 일정이 추가되었습니다.')
}

function deleteSchedule(idx) {
  남은일정.splice(idx, 1)
  syncScheduleToSite()
  renderScheduleList()
  updateAutoDate()
  updateScheduleSubtitle()
  showToast('일정이 삭제되었습니다.')
}

function editScheduleDate(idx, val) {
  남은일정[idx].날짜 = val
  syncScheduleToSite()
  // 요일 업데이트
  const dayEl = document.getElementById(`day-${idx}`)
  if (dayEl) { try { dayEl.textContent = `(${get요일(val)})` } catch(e){} }
}

function editScheduleWork(idx, val) {
  남은일정[idx].작업 = val
  syncScheduleToSite()
}

function renderScheduleList() {
  const el = document.getElementById('scheduleList')
  if (!남은일정.length) {
    el.innerHTML = '<p class="empty-msg">남은 일정이 없습니다</p>'
    return
  }
  el.innerHTML = 남은일정.map((item, i) => `
    <div class="schedule-item">
      <input class="input schedule-item-date"
        value="${item.날짜}"
        onchange="editScheduleDate(${i}, this.value)"
        style="width:72px;text-align:center;font-weight:500;color:#2563eb">
      <span id="day-${i}" class="schedule-item-day">(${get요일(item.날짜)})</span>
      <input class="input schedule-item-work"
        value="${item.작업.replace(/"/g,'&quot;')}"
        onchange="editScheduleWork(${i}, this.value)">
      <button class="del-btn" onclick="deleteSchedule(${i})">삭제</button>
    </div>
  `).join('')
}

// ── 템플릿 ──
function saveTemplate() {
  if (!현장명) return showToast('현장을 먼저 선택해주세요.')
  if (!남은일정.length) return showToast('저장할 일정이 없습니다.')
  템플릿목록[현장명] = [...남은일정]
  saveStorage()
  renderTemplates()
  showToast(`"${현장명}" 템플릿이 저장되었습니다.`)
}

function loadTemplate(name) {
  if (!현장명) return showToast('현장을 먼저 선택해주세요.')
  const tmpl = 템플릿목록[name]
  if (!tmpl) return showToast('템플릿을 찾을 수 없습니다.')
  const today = new Date()
  남은일정 = tmpl.map((item, i) => {
    const d = new Date(today); d.setDate(today.getDate() + i)
    return { 날짜: `${d.getMonth()+1}/${d.getDate()}`, 작업: item.작업 }
  })
  syncScheduleToSite()
  renderScheduleList()
  updateAutoDate()
  showToast(`"${name}" 템플릿을 불러왔습니다.`)
}

function deleteTemplate(name) {
  delete 템플릿목록[name]
  saveStorage()
  renderTemplates()
  showToast(`"${name}" 템플릿이 삭제되었습니다.`)
}

function renderTemplates() {
  const el = document.getElementById('templateList')
  const keys = Object.keys(템플릿목록)
  if (!keys.length) {
    el.innerHTML = '<p class="empty-msg">저장된 템플릿이 없습니다</p>'
    return
  }
  el.innerHTML = keys.map(name => `
    <div class="template-item">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="del-btn" onclick="deleteTemplate('${name.replace(/'/g,"\\'")}')">삭제</button>
        <span style="font-weight:500">${name}</span> (${템플릿목록[name].length}개 항목)
      </div>
      <button class="template-load-btn" onclick="loadTemplate('${name.replace(/'/g,"\\'")}')">불러오기</button>
    </div>
  `).join('')
}

// ── 보고서 생성 ──
function generate() {
  const today = new Date()
  const dateStr = today.toISOString().slice(0,10).replace(/-/g,'.')
  const todayLabel = todayType === '오늘' ? '오늘' : '오늘까지'
  const site = 현장명 || document.getElementById('siteInput').value.trim() || ''
  const note = document.getElementById('note').value.trim() || '금일 특이사항 없습니다.'

  let txt = `안녕하세요! \n[${dateStr}] \n[${site}] 공사 보고드립니다.🙂\n\n■ ${todayLabel} 작업: ${오늘공정.join(', ')  || ''} \n■ ${nextType} 작업: ${내일공정.join(', ') || ''} 예정\n\n* ${note}`

  if (마감임박 && 남은일정.length) {
    txt += '\n\n■남은일정 안내'
    남은일정.forEach(item => {
      txt += `\n${item.날짜}(${get요일(item.날짜)}) - ${item.작업}`
    })
  }
  txt += '\n\n감사합니다!'

  document.getElementById('resultBox').textContent = txt
  document.getElementById('resultCard').style.display = 'block'
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' })
  showToast('보고서가 생성되었습니다.')
}

function copyResult() {
  const txt = document.getElementById('resultBox').textContent
  navigator.clipboard.writeText(txt).then(() => showToast('복사되었습니다.'))
}

// ── 초기화 ──
loadStorage()
renderSites()
renderCats('todayCats', 오늘공정, 'toggleToday')
renderCats('nextCats', 내일공정, 'toggleNext')
renderScheduleList()
renderTemplates()
updateAutoDate()

if (마감임박) {
  document.getElementById('deadlineCheck').checked = true
  document.getElementById('scheduleSection').style.display = 'block'
}
if (현장명) {
  document.getElementById('siteInput').value = 현장명
  if (document.getElementById('templateSiteName'))
    document.getElementById('templateSiteName').value = 현장명
}
</script>
</body>
</html>
